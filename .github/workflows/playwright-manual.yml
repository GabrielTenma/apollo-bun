name: Playwright Manual Test

on:
  workflow_dispatch:
    inputs:
      cache_mode:
        description: 'Dependency cache strategy'
        required: true
        type: choice
        default: full-cached
        options:
          - full-cached
          - fresh-dependencies

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: oven-sh/setup-bun@v2
    - name: Cache Playwright Browsers
      if: inputs.cache_mode == 'full-cached'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          playwright-${{ runner.os }}-
    - name: Cache node_modules (Bun registry cache)
      if: inputs.cache_mode == 'full-cached'
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-
    - name: Clear Playwright browser cache
      if: inputs.cache_mode == 'fresh-dependencies'
      run: rm -rf ~/.cache/ms-playwright
    - name: Clear Bun install cache
      if: inputs.cache_mode == 'fresh-dependencies'
      run: rm -rf ~/.bun/install/cache
    - name: Install dependencies
      run: bun install
    - name: Install Playwright Browsers
      run: if [ -d "$HOME/.cache/ms-playwright" ]; then bunx playwright install; else bunx playwright install --with-deps; fi
    - name: Run Playwright tests
      run: bunx playwright test tests/coinmarketcap.target.spec.ts --project=chromium
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
